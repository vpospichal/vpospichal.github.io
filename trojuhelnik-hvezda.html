<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Přepočet trojúhelník → hvězda</title>
<style>
  body{font-family:system-ui,Arial,sans-serif;margin:0;background:#f7f7f7;color:#222}
  header{padding:18px 24px;background:#222;color:white}
  main{display:grid;grid-template-columns:1fr 1fr;gap:24px;padding:24px;max-width:1100px;margin:auto}
  section{background:white;border-radius:14px;padding:22px;box-shadow:0 2px 10px #0002}
  h2{margin-top:0;text-align:center}
  .schema{height:260px;display:flex;align-items:center;justify-content:center}
  svg{max-width:100%;height:250px}
  label{display:grid;grid-template-columns:70px 1fr 45px;align-items:center;gap:8px;margin:12px 0;font-size:18px}
  input{font-size:18px;padding:8px;border:1px solid #aaa;border-radius:8px;width:100%}
  .result{font-size:22px;padding:10px;margin:12px 0;background:#eef7ff;border-radius:8px}
  .err{color:#b00020;font-weight:700;min-height:1.5em}
  .formula{font-size:16px;background:#fff8e1;border-left:4px solid #d99b00;padding:10px;margin-top:16px}
  @media(max-width:800px){main{grid-template-columns:1fr}.schema{height:220px}}
</style>
</head>
<body>
<header><h1>Přepočet odporů: trojúhelník → hvězda</h1></header>
<main>
  <section>
    <h2>Trojúhelník Δ</h2>
    <div class="schema">
      <svg viewBox="0 0 360 260" aria-label="Trojúhelník rezistorů">
        <circle cx="180" cy="25" r="13" fill="#e22" stroke="#111" stroke-width="5"/><text x="150" y="18" fill="#c22" font-size="18" font-weight="700">svorka 2</text>
        <circle cx="55" cy="220" r="13" fill="#e22" stroke="#111" stroke-width="5"/><text x="20" y="248" fill="#c22" font-size="18" font-weight="700">svorka 1</text>
        <circle cx="305" cy="220" r="13" fill="#e22" stroke="#111" stroke-width="5"/><text x="270" y="248" fill="#c22" font-size="18" font-weight="700">svorka 3</text>
        <line x1="180" y1="38" x2="55" y2="207" stroke="#111" stroke-width="6"/>
        <line x1="180" y1="38" x2="305" y2="207" stroke="#111" stroke-width="6"/>
        <line x1="68" y1="220" x2="292" y2="220" stroke="#111" stroke-width="6"/>
        <rect x="96" y="105" width="34" height="78" transform="rotate(35 113 144)" fill="#bdeeff" stroke="#111" stroke-width="5"/><text x="70" y="125" font-size="22" font-weight="700">RA</text>
        <rect x="230" y="105" width="34" height="78" transform="rotate(-35 247 144)" fill="#bdeeff" stroke="#111" stroke-width="5"/><text x="268" y="125" font-size="22" font-weight="700">RB</text>
        <rect x="135" y="198" width="90" height="34" fill="#bdeeff" stroke="#111" stroke-width="5"/><text x="163" y="258" font-size="22" font-weight="700">RC</text>
      </svg>
    </div>
    <label>RA <input id="ra" type="number" min="0" step="any" value="1000"> Ω</label>
    <label>RB <input id="rb" type="number" min="0" step="any" value="1000"> Ω</label>
    <label>RC <input id="rc" type="number" min="0" step="any" value="1000"> Ω</label>
    <p class="err" id="err"></p>
  </section>

  <section>
    <h2>Hvězda Y</h2>
    <div class="schema">
      <svg viewBox="0 0 360 260" aria-label="Hvězda rezistorů">
        <circle cx="180" cy="25" r="13" fill="#e22" stroke="#111" stroke-width="5"/><text x="150" y="18" fill="#c22" font-size="18" font-weight="700">svorka 2</text>
        <circle cx="55" cy="220" r="13" fill="#e22" stroke="#111" stroke-width="5"/><text x="20" y="248" fill="#c22" font-size="18" font-weight="700">svorka 1</text>
        <circle cx="305" cy="220" r="13" fill="#e22" stroke="#111" stroke-width="5"/><text x="270" y="248" fill="#c22" font-size="18" font-weight="700">svorka 3</text>
        <circle cx="180" cy="150" r="5" fill="#111"/>
        <line x1="180" y1="38" x2="180" y2="145" stroke="#111" stroke-width="6"/>
        <line x1="60" y1="214" x2="176" y2="153" stroke="#111" stroke-width="6"/>
        <line x1="184" y1="153" x2="300" y2="214" stroke="#111" stroke-width="6"/>
        <rect x="163" y="70" width="34" height="78" fill="#fff2b6" stroke="#111" stroke-width="5"/><text x="203" y="104" font-size="22" font-weight="700">R2</text>
        <rect x="92" y="148" width="34" height="78" transform="rotate(62 109 187)" fill="#fff2b6" stroke="#111" stroke-width="5"/><text x="88" y="166" font-size="22" font-weight="700">R1</text>
        <rect x="234" y="148" width="34" height="78" transform="rotate(-62 251 187)" fill="#fff2b6" stroke="#111" stroke-width="5"/><text x="262" y="166" font-size="22" font-weight="700">R3</text>
      </svg>
    </div>
    <div class="result">R1 = <strong id="r1">–</strong></div>
    <div class="result">R2 = <strong id="r2">–</strong></div>
    <div class="result">R3 = <strong id="r3">–</strong></div>
    <div class="formula">
      R1 = RA·RC / (RA + RB + RC)<br>
      R2 = RA·RB / (RA + RB + RC)<br>
      R3 = RB·RC / (RA + RB + RC)
    </div>
  </section>
</main>
<script>
const inputs = [ra, rb, rc];
function fmt(x){
  if (!Number.isFinite(x)) return '–';
  if (x >= 1e6) return (x/1e6).toFixed(4).replace(/\.0+$/,'') + ' MΩ';
  if (x >= 1e3) return (x/1e3).toFixed(4).replace(/\.0+$/,'') + ' kΩ';
  return x.toFixed(4).replace(/\.0+$/,'').replace(/(\.\d*?)0+$/,'$1') + ' Ω';
}
function prepocitej(){
  const RA = Number(ra.value), RB = Number(rb.value), RC = Number(rc.value);
  const sum = RA + RB + RC;
  if ([RA,RB,RC].some(v => !Number.isFinite(v) || v < 0) || sum <= 0) {
    err.textContent = 'Zadej nezáporné hodnoty, alespoň jedna musí být větší než nula.';
    r1.textContent = r2.textContent = r3.textContent = '–';
    return;
  }
  err.textContent = '';
  r1.textContent = fmt(RA * RC / sum);
  r2.textContent = fmt(RA * RB / sum);
  r3.textContent = fmt(RB * RC / sum);
}
inputs.forEach(i => i.addEventListener('input', prepocitej));
prepocitej();
</script>
</body>
</html>
